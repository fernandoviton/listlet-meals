name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Inject Supabase secrets into config.js
        run: |
          sed -i "s|SUPABASE_URL: ''|SUPABASE_URL: '${{ secrets.SUPABASE_URL }}'|; s|SUPABASE_PUBLISHABLE_KEY: ''|SUPABASE_PUBLISHABLE_KEY: '${{ secrets.SUPABASE_PUBLISHABLE_KEY }}'|" config.js

      - name: Verify config.js was populated
        run: |
          if grep -qE "SUPABASE_URL: ''|SUPABASE_PUBLISHABLE_KEY: ''" config.js; then
            echo "::error::config.js still has empty Supabase values after injection — the site would ship in mock mode. Likely cause: the SUPABASE_URL / SUPABASE_PUBLISHABLE_KEY repo secrets are empty or unset (add them under Settings → Secrets and variables → Actions), OR the sed pattern above no longer matches config.js."
            cat config.js
            exit 1
          fi

      - name: Generate version.js
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHA=$(git rev-parse --short HEAD)
          MSG=$(git log -1 --pretty=%s)
          echo "var APP_VERSION = '${TIMESTAMP} ${SHA} ${MSG}';" > shared/version.js

      - name: Stage deploy files
        run: |
          mkdir _site
          cp -r shared _site/
          cp index.html app.js app.css config.js _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
